<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Super Admin — BAPS Scranton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --saffron: #E8650A; --gold: #C8860A; --gold-light: #F5C842;
      --cream: #FDF6EC; --cream-dark: #F5E6CC;
      --brown: #5C2D0A; --brown-mid: #8B4513; --text-muted: #8B6040;
    }
    body { font-family: 'DM Sans', sans-serif; background: #F7F0E8; color: var(--brown); min-height: 100vh; }
    .top-border { height: 4px; background: linear-gradient(90deg, var(--brown), var(--saffron), var(--gold-light), var(--saffron), var(--brown)); }

    /* Login */
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: #fff; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(92,45,10,0.12); text-align: center; }
    .login-card h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; margin-bottom: 4px; }
    .login-badge { display: inline-block; background: linear-gradient(135deg, var(--brown), var(--brown-mid)); color: #fff; font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 16px; }
    .login-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
    .login-card input { width: 100%; padding: 12px 14px; border: 1px solid var(--cream-dark); border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; margin-bottom: 12px; background: var(--cream); }
    .login-card input:focus { outline: none; border-color: var(--gold); }
    .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--brown), var(--brown-mid)); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
    .btn-primary:hover { opacity: 0.9; }
    .login-error { color: #991b1b; font-size: 13px; margin-top: 10px; display: none; }

    /* Admin */
    #admin-screen { display: none; }
    .admin-header { background: linear-gradient(160deg, var(--brown) 0%, #7a1f00 100%); padding: 20px 24px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
    .admin-header-left h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; }
    .admin-header-left p { font-size: 12px; opacity: 0.6; margin-top: 2px; }
    .super-badge { background: rgba(245,200,66,0.2); border: 1px solid rgba(245,200,66,0.4); color: var(--gold-light); font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; display: inline-block; margin-top: 6px; }
    .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 7px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

    /* Tabs */
    .tabs { background: #1a1a1a; display: flex; }
    .tab-btn { flex: 1; padding: 14px; background: none; border: none; color: #000; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; transition: all 0.2s; background: #e8e0d5; }
    .tab-btn.active { color: var(--gold-light); border-bottom-color: var(--gold-light); background: #1a1a1a; }
    .tab-btn:hover:not(.active) { color: var(--gold); background: #2d2d2d; }

    /* Body */
    .admin-body { max-width: 700px; margin: 0 auto; padding: 28px 20px 60px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 16px rgba(92,45,10,0.08); }
    .card h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 16px; color: var(--brown); }

    /* Forms */
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 140px; }
    .form-group label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 11px 13px; border: 1px solid var(--cream-dark); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--cream); }
    .form-group input:focus { outline: none; border-color: var(--gold); }
    .btn-create { margin-top: 14px; padding: 12px 24px; background: linear-gradient(135deg, var(--saffron), var(--gold)); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
    .btn-create:hover { opacity: 0.9; }
    .success-msg { display: none; margin-top: 12px; padding: 12px 14px; background: #f0fdf4; border-radius: 10px; font-size: 13px; color: #166534; }
    .success-msg a { color: var(--gold); font-weight: 500; }
    .error-msg { display: none; margin-top: 12px; padding: 12px 14px; background: #fef2f2; border-radius: 10px; font-size: 13px; color: #991b1b; }

    /* Lists */
    .item-list { display: flex; flex-direction: column; gap: 10px; }
    .item { background: var(--cream); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(200,134,10,0.15); }
    .item-info { flex: 1; }
    .item-name { font-size: 15px; font-weight: 500; color: var(--brown); }
    .item-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .item-link { font-size: 11px; color: var(--gold); text-decoration: none; display: block; margin-top: 4px; }
    .item-link:hover { text-decoration: underline; }
    .btn-delete { background: none; border: 1px solid #fca5a5; color: #dc2626; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
    .btn-delete:hover { background: #fef2f2; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 28px; height: 28px; border: 2px solid rgba(200,134,10,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 32px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Manager badge */
    .role-badge { display: inline-block; background: rgba(200,134,10,0.1); color: var(--gold); border: 1px solid rgba(200,134,10,0.3); font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; margin-left: 8px; vertical-align: middle; }

    /* ── Animations ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

    #login-screen { animation: fadeIn 0.4s ease both; }
    .login-card { animation: slideUp 0.4s ease both; }
    .admin-header { animation: slideDown 0.35s ease both; }
    .tabs { animation: slideDown 0.35s 0.05s ease both; opacity: 0; animation-fill-mode: both; }
    .card { animation: slideUp 0.4s ease both; }
    .card:nth-child(2) { animation-delay: 0.07s; }
    .card:nth-child(3) { animation-delay: 0.14s; }

    .item { transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
    .item:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(92,45,10,0.12); }

    .btn-create { transition: opacity 0.2s ease, transform 0.15s ease; }
    .btn-create:hover { transform: translateY(-1px); }
    .btn-create:active { transform: translateY(0); }

    .btn-primary { transition: opacity 0.2s ease, transform 0.15s ease; }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .logout-btn { transition: background 0.2s ease, transform 0.15s ease; }
    .logout-btn:hover { transform: translateY(-1px); background: rgba(255,255,255,0.18); }

    /* Inline edit panels slide open */
    .edit-panel { overflow: hidden; animation: slideDown 0.2s ease both; }

    /* Pass/manager items fade in when list loads */
    .item-list .item { animation: slideUp 0.25s ease both; }
    .item-list .item:nth-child(1) { animation-delay: 0.02s; }
    .item-list .item:nth-child(2) { animation-delay: 0.06s; }
    .item-list .item:nth-child(3) { animation-delay: 0.10s; }
    .item-list .item:nth-child(4) { animation-delay: 0.14s; }
    .item-list .item:nth-child(5) { animation-delay: 0.18s; }

    /* Tab transition */
    .tab-panel.active { animation: fadeIn 0.2s ease both; }

    /* Event picker items */
    #event-picker-list .item { cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s ease; }
    #event-picker-list .item:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(92,45,10,0.14); border-color: rgba(200,134,10,0.4); }
    #event-picker-list .item:active { transform: translateY(0); }

    /* Success message pop */
    .success-msg { animation: slideDown 0.25s ease both; }
  </style>
</head>
<body>
  <div class="top-border"></div>

  <!-- Login -->
  <div id="login-screen">
    <div class="login-card">
      <h1>Admin Portal</h1>
      <div class="login-badge">Super Admin</div>
      <p>Password-only access</p>
      <input type="password" id="password-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn-primary" onclick="login()">Sign In</button>
      <div class="login-error" id="login-error">Incorrect password</div>
    </div>
  </div>

  <!-- Admin -->
  <div id="admin-screen">
    <div class="admin-header">
      <div class="admin-header-left">
        <h1>Admin Portal</h1>
        <p>BAPS Scranton — screvents.com</p>
        <div class="super-badge">⭐ Super Admin</div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('managers')">👤 Managers</button>
      <button class="tab-btn" onclick="switchTab('events')">📅 Events</button>
    </div>

    <div class="admin-body">

      <!-- Managers Tab -->
      <div class="tab-panel active" id="tab-managers">
        <div class="card">
          <h2>Add Manager</h2>
          <div class="form-row">
            <div class="form-group"><label>Username</label><input type="text" id="new-manager-username" placeholder="" /></div>
            <div class="form-group"><label>Password</label><input type="password" id="new-manager-password" placeholder="" /></div>
          </div>
          <div style="margin-top:14px">
            <div style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px">Permissions</div>
            <div style="display:flex;flex-direction:column;gap:8px">
              <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="new-perm-view" checked> View passes</label>
              <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="new-perm-create"> Create &amp; delete passes</label>
              <label style="display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer"><input type="checkbox" id="new-perm-edit"> Edit passes</label>
            </div>
          </div>
          <button class="btn-create" onclick="createManager()">Add Manager →</button>
          <div class="success-msg" id="manager-success"></div>
          <div class="error-msg" id="manager-error"></div>
        </div>
        <div class="card">
          <h2>All Managers</h2>
          <div id="managers-container"><div class="spinner"></div></div>
        </div>
      </div>


      <!-- Events Tab -->
      <div class="tab-panel" id="tab-events">
        <div class="card">
          <h2>Add Event</h2>
          <div class="form-row">
            <div class="form-group" style="flex:2;min-width:200px"><label>Event Name</label><input type="text" id="new-event-name" placeholder="Event Name" /></div>
            <div class="form-group"><label>Start Date</label><input type="text" id="new-event-start" placeholder="e.g. Friday, March 20" /></div>
            <div class="form-group"><label>End Date</label><input type="text" id="new-event-end" placeholder="e.g. Sunday, March 22" /></div>
          </div>
          <div class="form-row" style="margin-top:10px">
            <div class="form-group"><label>Start Time</label><input type="text" id="new-event-start-time" placeholder="e.g. 6:00 pm" /></div>
            <div class="form-group"><label>End Time <span style="font-weight:300;text-transform:none;letter-spacing:0">(optional)</span></label><input type="text" id="new-event-end-time" placeholder="e.g. 9:00 pm" /></div>
            <div class="form-group"><label>Max VIP Passes</label><input type="number" id="new-event-max" placeholder="50" min="1" /></div>
          </div>
          <div class="form-row" style="margin-top:10px">
            <div class="form-group"><label>Additional Notes</label><input type="text" id="new-event-notes" placeholder="Notes" /></div>
          </div>
          <button class="btn-create" onclick="addEvent()">Add Event →</button>
          <div class="success-msg" id="event-success"></div>
          <div class="error-msg" id="event-error"></div>
        </div>
        <div class="card">
          <h2>All Events</h2>
          <div id="events-container"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let adminPassword = '';
    const PASSES_API = '/.netlify/functions/admin-passes';
    const MANAGERS_API = '/.netlify/functions/superadmin-managers';

    function login() {
      const pwd = document.getElementById('password-input').value;
      if (!pwd) return;
      adminPassword = pwd;
      // Verify by attempting to load passes
      fetch(MANAGERS_API, { headers: { 'x-admin-password': adminPassword } })
        .then(r => {
          if (!r.ok) throw new Error('Unauthorized');
          return r.json();
        })
        .then(managers => {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('admin-screen').style.display = 'block';
          document.getElementById('login-error').style.display = 'none';
          renderManagers(managers);
          loadEvents();
        })
        .catch(() => {
          document.getElementById('login-error').style.display = 'block';
          adminPassword = '';
        });
    }

    function logout() {
      adminPassword = '';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('password-input').value = '';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }

    // ── VIP Passes ──
    function renderPasses(passes) {
      const c = document.getElementById('passes-container');
      if (!passes.length) { c.innerHTML = '<div class="empty-state">No passes yet.</div>'; return; }
      c.innerHTML = '<div class="item-list">' + passes.map(p => `
        <div class="item" id="pass-${p.id}">
          <div class="item-info">
            <div class="item-name">${p.guest_name}</div>
            <div class="item-sub">${p.event_name} · ${p.event_date}</div>
            <a class="item-link" href="https://screvents.com/vip/${p.id}" target="_blank">screvents.com/vip/${p.id} ↗</a>
          </div>
          <button class="btn-delete" onclick="deletePass('${p.id}')">Delete</button>
        </div>`).join('') + '</div>';
    }

    async function createPass() {
      const guest_name = document.getElementById('new-guest').value.trim();
      const event_name = document.getElementById('new-event').value.trim();
      const event_date = document.getElementById('new-date').value.trim();
      if (!guest_name || !event_name || !event_date) { alert('Please fill in all fields'); return; }
      const res = await fetch(PASSES_API, {
        method: 'POST',
        headers: { 'x-admin-password': adminPassword, 'Content-Type': 'application/json' },
        body: JSON.stringify({ guest_name, event_name, event_date })
      });
      const pass = await res.json();
      document.getElementById('new-guest').value = '';
      const link = `https://screvents.com/vip/${pass.id}`;
      const el = document.getElementById('pass-success');
      el.innerHTML = `✅ Pass created! <a href="${link}" target="_blank">${link}</a>`;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 8000);
      const r2 = await fetch(PASSES_API, { headers: { 'x-admin-password': adminPassword } });
      renderPasses(await r2.json());
    }

    async function deletePass(id) {
      if (!confirm('Delete this pass?')) return;
      await fetch(PASSES_API, {
        method: 'DELETE',
        headers: { 'x-admin-password': adminPassword, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      document.getElementById(`pass-${id}`)?.remove();
    }

    // ── Managers ──
    async function loadManagers() {
      const res = await fetch(MANAGERS_API, { headers: { 'x-admin-password': adminPassword } });
      const managers = await res.json();
      renderManagers(managers);
    }

    function permLabel(p) {
      const labels = [];
      if (p?.view_passes) labels.push('View');
      if (p?.create_delete_passes) labels.push('Create/Delete');
      if (p?.edit_passes) labels.push('Edit');
      return labels.length ? labels.join(', ') : 'No permissions';
    }

    function renderManagers(managers) {
      const c = document.getElementById('managers-container');
      if (!managers.length) { c.innerHTML = '<div class="empty-state">No managers yet.</div>'; return; }
      c.innerHTML = '<div class="item-list">' + managers.map(m => `
        <div class="item" id="mgr-${m.id}" style="flex-direction:column;align-items:stretch;gap:10px">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="item-info">
              <div class="item-name">${m.username} <span class="role-badge">Manager</span></div>
              <div class="item-sub">Added ${new Date(m.created_at).toLocaleDateString()} · ${permLabel(m.permissions)}</div>
            </div>
            <button onclick="toggleEditManager('${m.id}', ${JSON.stringify(m).replace(/"/g, '&quot;')})" style="background:none;border:1px solid rgba(200,134,10,0.4);color:var(--gold);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0">Edit</button>
            <button class="btn-delete" onclick="deleteManager('${m.id}')">Remove</button>
          </div>
          <div id="mgr-edit-${m.id}" style="display:none;background:var(--cream);border-radius:10px;padding:14px">
            <div class="form-row">
              <div class="form-group"><label>Username</label><input type="text" id="mgr-edit-username-${m.id}" value="${m.username}" /></div>
              <div class="form-group"><label>New Password</label><input type="password" id="mgr-edit-password-${m.id}" placeholder="Leave blank to keep" /></div>
            </div>
            <div style="margin-top:12px">
              <div style="font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px">Permissions</div>
              <div style="display:flex;flex-direction:column;gap:6px">
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="mgr-edit-view-${m.id}" ${m.permissions?.view_passes ? 'checked' : ''}> View passes</label>
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="mgr-edit-create-${m.id}" ${m.permissions?.create_delete_passes ? 'checked' : ''}> Create &amp; delete passes</label>
                <label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer"><input type="checkbox" id="mgr-edit-editp-${m.id}" ${m.permissions?.edit_passes ? 'checked' : ''}> Edit passes</label>
              </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px">
              <button onclick="saveManager('${m.id}')" style="padding:8px 20px;background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif">Save</button>
              <button onclick="toggleEditManager('${m.id}')" style="padding:8px 16px;background:none;border:1px solid var(--cream-dark);color:var(--text-muted);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">Cancel</button>
            </div>
            <div id="mgr-edit-err-${m.id}" style="display:none;margin-top:8px;color:#991b1b;font-size:12px"></div>
          </div>
        </div>`).join('') + '</div>';
    }

    async function createManager() {
      const username = document.getElementById('new-manager-username').value.trim();
      const password = document.getElementById('new-manager-password').value;
      const errEl = document.getElementById('manager-error');
      const sucEl = document.getElementById('manager-success');
      errEl.style.display = 'none';
      if (!username || !password) { errEl.textContent = 'Please fill in both fields'; errEl.style.display = 'block'; return; }
      const permissions = {
        view_passes: document.getElementById('new-perm-view').checked,
        create_delete_passes: document.getElementById('new-perm-create').checked,
        edit_passes: document.getElementById('new-perm-edit').checked
      };
      const res = await fetch(MANAGERS_API, {
        method: 'POST',
        headers: { 'x-admin-password': adminPassword, 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, permissions })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
      document.getElementById('new-manager-username').value = '';
      document.getElementById('new-manager-password').value = '';
      document.getElementById('new-perm-create').checked = false;
      document.getElementById('new-perm-edit').checked = false;
      sucEl.textContent = `✅ Manager "${data.username}" added. They can log in at screvents.com/admin`;
      sucEl.style.display = 'block';
      setTimeout(() => sucEl.style.display = 'none', 6000);
      loadManagers();
    }

    async function deleteManager(id) {
      if (!confirm('Remove this manager?')) return;
      await fetch(MANAGERS_API, {
        method: 'DELETE',
        headers: { 'x-admin-password': adminPassword, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      document.getElementById(`mgr-${id}`)?.remove();
    }

    // ── Events ──
    const EVENTS_API = '/.netlify/functions/superadmin-events';

    async function loadEvents() {
      const res = await fetch(EVENTS_API, { headers: { 'x-admin-password': adminPassword } });
      const events = await res.json();
      renderEvents(events);
    }

    function renderEvents(events) {
      const c = document.getElementById('events-container');
      if (!events.length) { c.innerHTML = '<div class="empty-state">No events yet.</div>'; return; }
      c.innerHTML = '<div class="item-list">' + events.map(e => `
        <div class="item" id="evt-${e.id}" style="flex-direction:column;align-items:stretch;gap:10px">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="item-info">
              <div class="item-name">${e.event_name}</div>
              <div class="item-sub">${e.start_date}${e.end_date !== e.start_date ? ' — ' + e.end_date : ''}${e.start_time ? ' · ' + (e.end_time ? e.start_time + ' – ' + e.end_time : e.start_time) : ''} · Max ${e.max_passes} passes</div>
              ${e.notes ? `<div class="item-sub" style="margin-top:2px;font-style:italic">${e.notes}</div>` : ''}
            </div>
            <button onclick="toggleEditEvent('${e.id}')" style="background:none;border:1px solid rgba(200,134,10,0.4);color:var(--gold);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0">Edit</button>
            <button class="btn-delete" onclick="deleteEvent('${e.id}')">Delete</button>
          </div>
          <div id="edit-${e.id}" style="display:none;background:var(--cream);border-radius:10px;padding:14px">
            <div class="form-row">
              <div class="form-group" style="flex:2;min-width:160px"><label>Event Name</label><input type="text" id="edit-name-${e.id}" value="${e.event_name}" /></div>
              <div class="form-group"><label>Start Date</label><input type="text" id="edit-start-${e.id}" value="${e.start_date}" /></div>
              <div class="form-group"><label>End Date</label><input type="text" id="edit-end-${e.id}" value="${e.end_date}" /></div>
            </div>
            <div class="form-row" style="margin-top:8px">
              <div class="form-group"><label>Start Time</label><input type="text" id="edit-start-time-${e.id}" value="${e.start_time || ''}" placeholder="e.g. 6:00 pm" /></div>
              <div class="form-group"><label>End Time (optional)</label><input type="text" id="edit-end-time-${e.id}" value="${e.end_time || ''}" placeholder="e.g. 9:00 pm" /></div>
              <div class="form-group"><label>Max Passes</label><input type="number" id="edit-max-${e.id}" value="${e.max_passes}" min="1" /></div>
            </div>
            <div class="form-row" style="margin-top:8px">
              <div class="form-group"><label>Notes</label><input type="text" id="edit-notes-${e.id}" value="${e.notes || ''}" /></div>
            </div>
            <div style="display:flex;gap:8px;margin-top:12px">
              <button onclick="saveEvent('${e.id}')" style="padding:8px 20px;background:linear-gradient(135deg,var(--saffron),var(--gold));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif">Save</button>
              <button onclick="toggleEditEvent('${e.id}')" style="padding:8px 16px;background:none;border:1px solid var(--cream-dark);color:var(--text-muted);border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">Cancel</button>
            </div>
            <div id="edit-err-${e.id}" style="display:none;margin-top:8px;color:#991b1b;font-size:12px"></div>
          </div>
        </div>`).join('') + '</div>';
    }

    
    async function deleteEvent(id) {
      if (!confirm('Delete this event? All associated passes will be unlinked.')) return;
      await fetch(EVENTS_API, {
        method: 'DELETE',
        headers: { 'x-admin-password': adminPassword, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id })
      });
      document.getElementById('evt-' + id)?.remove();
    }


    function toggleEditManager(id) {
      const el = document.getElementById('mgr-edit-' + id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function saveManager(id) {
      const username = document.getElementById('mgr-edit-username-' + id).value.trim();
      const password = document.getElementById('mgr-edit-password-' + id).value;
      const permissions = {
        view_passes: document.getElementById('mgr-edit-view-' + id).checked,
        create_delete_passes: document.getElementById('mgr-edit-create-' + id).checked,
        edit_passes: document.getElementById('mgr-edit-editp-' + id).checked
      };
      const errEl = document.getElementById('mgr-edit-err-' + id);
      errEl.style.display = 'none';
      const body = { id, permissions };
      if (username) body.username = username;
      if (password) body.password = password;
      const res = await fetch(MANAGERS_API, {
        method: 'PATCH',
        headers: { 'x-admin-password': adminPassword, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
      loadManagers();
    }
    function toggleEditEvent(id) {
      const el = document.getElementById('edit-' + id);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    async function saveEvent(id) {
      const event_name = document.getElementById('edit-name-' + id).value.trim();
      const start_date = document.getElementById('edit-start-' + id).value.trim();
      const end_date = document.getElementById('edit-end-' + id).value.trim();
      const start_time = document.getElementById('edit-start-time-' + id).value.trim();
      const end_time = document.getElementById('edit-end-time-' + id).value.trim();
      const max_passes = parseInt(document.getElementById('edit-max-' + id).value) || 50;
      const notes = document.getElementById('edit-notes-' + id).value.trim();
      const errEl = document.getElementById('edit-err-' + id);
      if (!event_name || !start_date || !end_date) { errEl.textContent = 'Event name, start and end date are required'; errEl.style.display = 'block'; return; }
      errEl.style.display = 'none';
      const res = await fetch(EVENTS_API, {
        method: 'PATCH',
        headers: { 'x-admin-password': adminPassword, 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, event_name, start_date, end_date, start_time, end_time, max_passes, notes })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }
      loadEvents();
    }
  </script>
</body>
</html>

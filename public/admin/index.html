<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — BAPS Scranton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --saffron: #E8650A; --gold: #C8860A; --gold-light: #F5C842;
      --cream: #FDF6EC; --cream-dark: #F5E6CC;
      --brown: #5C2D0A; --brown-mid: #8B4513; --text-muted: #8B6040;
    }
    body { font-family: 'DM Sans', sans-serif; background: #F7F0E8; color: var(--brown); min-height: 100vh; }
    .top-border { height: 4px; background: linear-gradient(90deg, var(--brown), var(--saffron), var(--gold-light), var(--saffron), var(--brown)); }
    #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .login-card { background: #fff; border-radius: 20px; padding: 40px 32px; width: 100%; max-width: 360px; box-shadow: 0 8px 32px rgba(92,45,10,0.12); text-align: center; }
    .login-card h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; margin-bottom: 16px; }
    .login-card input { width: 100%; padding: 12px 14px; border: 1px solid var(--cream-dark); border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; margin-bottom: 10px; background: var(--cream); }
    .login-card input:focus { outline: none; border-color: var(--gold); }
    .btn-primary { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--brown), var(--brown-mid)); color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .login-error { color: #991b1b; font-size: 13px; margin-top: 10px; display: none; }
    #admin-screen { display: none; }
    .admin-header { background: linear-gradient(160deg, var(--brown) 0%, #7a1f00 100%); padding: 20px 24px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
    .admin-header h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 700; }
    .admin-header p { font-size: 12px; opacity: 0.6; margin-top: 2px; }
    .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 7px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .tabs { background: #1a1a1a; display: flex; }
    .tab-btn { flex: 1; padding: 14px; background: none; border: none; color: #000; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid transparent; transition: all 0.2s; background: #e8e0d5; }
    .tab-btn.active { color: var(--gold-light); border-bottom-color: var(--gold-light); background: #1a1a1a; }
    .tab-btn:hover:not(.active) { color: var(--gold); background: #2d2d2d; }
    .admin-body { max-width: 700px; margin: 0 auto; padding: 28px 20px 60px; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .card { background: #fff; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 2px 16px rgba(92,45,10,0.08); }
    .card h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 16px; color: var(--brown); }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .form-group { flex: 1; min-width: 140px; }
    .form-group label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 11px 13px; border: 1px solid var(--cream-dark); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--cream); }
    .form-group input:focus { outline: none; border-color: var(--gold); }
    .btn-create { margin-top: 14px; padding: 12px 24px; background: linear-gradient(135deg, var(--saffron), var(--gold)); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .success-msg { display: none; margin-top: 12px; padding: 12px 14px; background: #f0fdf4; border-radius: 10px; font-size: 13px; color: #166534; }
    .success-msg a { color: var(--gold); font-weight: 500; }
    .item-list { display: flex; flex-direction: column; gap: 10px; }
    .item { background: var(--cream); border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid rgba(200,134,10,0.15); }
    .item-info { flex: 1; }
    .item-name { font-size: 15px; font-weight: 500; color: var(--brown); }
    .item-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .item-link { font-size: 11px; color: var(--gold); text-decoration: none; display: block; margin-top: 4px; }
    .item-link:hover { text-decoration: underline; }
    .btn-delete { background: none; border: 1px solid #fca5a5; color: #dc2626; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
    .btn-delete:hover { background: #fef2f2; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 28px; height: 28px; border: 2px solid rgba(200,134,10,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 32px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .rsvp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .rsvp-table th { text-align: left; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); padding: 8px 12px; border-bottom: 1px solid var(--cream-dark); }
    .rsvp-table td { padding: 10px 12px; border-bottom: 1px solid rgba(200,134,10,0.08); color: var(--brown); }
    .rsvp-table tr:last-child td { border-bottom: none; }
    .rsvp-table tr:hover td { background: var(--cream); }
    .zone-pill { display: inline-block; background: rgba(200,134,10,0.1); color: var(--gold); border: 1px solid rgba(200,134,10,0.25); font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  </style>
</head>
<body>
  <div class="top-border"></div>
  <div id="login-screen">
    <div class="login-card">
      <h1>Admin Portal</h1>
      <input type="text" id="username-input" placeholder="Username" onkeydown="if(event.key==='Enter')login()" />
      <input type="password" id="password-input" placeholder="Password" onkeydown="if(event.key==='Enter')login()" />
      <button class="btn-primary" onclick="login()">Sign In</button>
      <div class="login-error" id="login-error">Invalid username or password</div>
    </div>
  </div>
  <div id="admin-screen">
    <div class="admin-header">
      <div>
        <h1>Admin Portal</h1>
        <p id="welcome-text">BAPS Scranton — screvents.com</p>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('passes', this)">🎟 VIP Passes</button>
      <button class="tab-btn" onclick="switchTab('rsvps', this)">📋 RSVPs</button>
    </div>
    <div class="admin-body">
      <div class="tab-panel active" id="tab-passes">
        <!-- Step 1: Pick event -->
        <div class="card" id="event-picker-card">
          <h2>Select Event</h2>
          <div id="event-picker-list"><div class="spinner"></div></div>
        </div>
        <!-- Step 2: Create pass (shown after event selected) -->
        <div id="pass-create-section" style="display:none">
          <div class="card" id="create-pass-card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
              <h2 style="margin:0" id="selected-event-title">Create Pass</h2>
              <button onclick="clearEventSelection()" style="background:none;border:1px solid var(--cream-dark);color:var(--text-muted);padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;">Change Event</button>
            </div>
            <div class="form-group"><label>Guest Name</label><input type="text" id="new-guest" placeholder="Full Name" /></div>
            <button class="btn-create" style="margin-top:14px" onclick="createPass()">Generate Pass →</button>
            <div class="success-msg" id="pass-success"></div>
          </div>
          <div class="card">
            <h2>Passes for This Event</h2>
            <div id="passes-container"><div class="spinner"></div></div>
          </div>
        </div>
      </div>
      <div class="tab-panel" id="tab-rsvps">
        <div class="card">
          <h2>RSVP Responses</h2>
          <div id="rsvps-container"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>
  <script>
    let sessionToken = sessionStorage.getItem('manager_token') || '';
    let sessionPermissions = JSON.parse(sessionStorage.getItem('manager_permissions') || '{"view_passes":true,"create_delete_passes":false,"edit_passes":false}');
    const PASSES_API = '/.netlify/functions/admin-passes';
    const AUTH_API = '/.netlify/functions/manager-auth';
    const EVENTS_API = '/.netlify/functions/superadmin-events';

    if (sessionToken) {
      fetch(AUTH_API + '/verify?token=' + sessionToken)
        .then(r => r.json())
        .then(d => { if (d.valid) showAdmin(d.username, d.permissions); else { sessionToken = ''; sessionStorage.clear(); } })
        .catch(() => { sessionToken = ''; sessionStorage.clear(); });
    }

    async function login() {
      const username = document.getElementById('username-input').value.trim();
      const password = document.getElementById('password-input').value;
      if (!username || !password) return;
      const res = await fetch(AUTH_API + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
      const data = await res.json();
      if (!res.ok) { document.getElementById('login-error').style.display = 'block'; return; }
      sessionToken = data.token;
      sessionStorage.setItem('manager_token', sessionToken);
      sessionStorage.setItem('manager_username', data.username);
      showAdmin(data.username, data.permissions);
    }

    function showAdmin(username, permissions) {
      if (permissions) {
        sessionPermissions = permissions;
        sessionStorage.setItem('manager_permissions', JSON.stringify(permissions));
      }
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('welcome-text').textContent = 'Signed in as ' + username;
      loadEventPicker();
    }

    async function logout() {
      if (sessionToken) await fetch(AUTH_API + '/logout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: sessionToken }) });
      sessionToken = ''; sessionStorage.clear();
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('password-input').value = '';
    }

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      btn.classList.add('active');
      if (tab === 'rsvps') loadRsvps();
    }

    function authHeaders() { return { 'x-manager-token': sessionToken, 'Content-Type': 'application/json' }; }

    let selectedEventId = null;

    async function loadEventPicker() {
      const res = await fetch(EVENTS_API, { headers: { 'x-manager-token': sessionToken } });
      const events = await res.json();
      const c = document.getElementById('event-picker-list');
      if (!events.length) { c.innerHTML = '<div class="empty-state">No events available. Ask your admin to create one.</div>'; return; }
      c.innerHTML = '<div class="item-list">' + events.map(e => `
        <div class="item" style="cursor:pointer" onclick="selectEvent('${e.id}', '${e.event_name.replace(/'/g, "\'")}')">
          <div class="item-info">
            <div class="item-name">${e.event_name}</div>
            <div class="item-sub">${e.start_date}${e.end_date !== e.start_date ? ' — ' + e.end_date : ''}${e.start_time ? ' · ' + (e.end_time ? e.start_time + ' – ' + e.end_time : e.start_time) : ''} · Max ${e.max_passes} passes</div>
            ${e.notes ? `<div class="item-sub" style="font-style:italic">${e.notes}</div>` : ''}
          </div>
          <span style="color:var(--gold);font-size:13px;font-weight:500">Select →</span>
        </div>`).join('') + '</div>';
    }

        function selectEvent(id, name) {
      selectedEventId = id;
      document.getElementById('event-picker-card').style.display = 'none';
      document.getElementById('pass-create-section').style.display = 'block';
      document.getElementById('selected-event-title').textContent = name;
      const canCreate = sessionPermissions.create_delete_passes;
      document.getElementById('create-pass-card').style.display = canCreate ? 'block' : 'none';
      loadPasses();
    }

    function clearEventSelection() {
      selectedEventId = null;
      document.getElementById('event-picker-card').style.display = 'block';
      document.getElementById('pass-create-section').style.display = 'none';
    }

    async function loadPasses() {
      if (!selectedEventId) return;
      const res = await fetch(PASSES_API + '?event_id=' + selectedEventId, { headers: { 'x-manager-token': sessionToken } });
      renderPasses(await res.json());
    }

    function renderPasses(passes) {
      const c = document.getElementById('passes-container');
      if (!passes.length) { c.innerHTML = '<div class="empty-state">No passes for this event yet.</div>'; return; }
      const canDelete = sessionPermissions.create_delete_passes;
      c.innerHTML = '<div class="item-list">' + passes.map(p => `
        <div class="item" id="pass-${p.id}">
          <div class="item-info">
            <div class="item-name">${p.guest_name}</div>
            <a class="item-link" href="https://screvents.com/vip/${p.id}" target="_blank">screvents.com/vip/${p.id} ↗</a>
          </div>
          ${canDelete ? `<button class="btn-delete" onclick="deletePass('${p.id}')">Delete</button>` : ''}
        </div>`).join('') + '</div>';
    }

    async function createPass() {
      const guest_name = document.getElementById('new-guest').value.trim();
      if (!guest_name || !selectedEventId) { alert('Please enter a guest name'); return; }
      const res = await fetch(PASSES_API, { method: 'POST', headers: authHeaders(), body: JSON.stringify({ guest_name, event_id: selectedEventId }) });
      const pass = await res.json();
      if (!res.ok) { alert(pass.error); return; }
      document.getElementById('new-guest').value = '';
      const link = 'https://screvents.com/vip/' + pass.id;
      const el = document.getElementById('pass-success');
      el.innerHTML = '✅ Pass created! <a href="' + link + '" target="_blank">' + link + '</a>';
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 8000);
      loadPasses();
    }

    async function deletePass(id) {
      if (!confirm('Delete this pass?')) return;
      await fetch(PASSES_API, { method: 'DELETE', headers: authHeaders(), body: JSON.stringify({ id }) });
      document.getElementById('pass-' + id)?.remove();
    }

    async function loadRsvps() {
      const c = document.getElementById('rsvps-container');
      c.innerHTML = '<div class="spinner"></div>';
      c.innerHTML = '<div class="empty-state">RSVP integration coming soon.</div>';
    }
  </script>
</body>
</html>

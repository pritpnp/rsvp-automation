name: Event-Night RSVP Cleanup

# Mirrors the Google Apps Script that wipes Sheet RSVPs at 11 PM on the
# event night, but applied to BOTH the Sheet and Supabase so the two
# stores stay in agreement (otherwise the 10-min sync-check would fire
# drift alerts every time an event ends).
#
# Two crons because GitHub Actions runs in UTC and we want 11 PM
# America/New_York year-round:
#   - 3 AM UTC = 11 PM EDT (Mar-Nov)
#   - 4 AM UTC = 11 PM EST (Nov-Mar)
# Only one is "11 PM local" on any given date; the other firing computes
# today's NY date inside the script and sees nothing to clean, so it
# exits silently with no Telegram.

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: cleanup-past-rsvps
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOG_SA_JSON: ${{ secrets.GOOG_SA_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/cleanup-past-rsvps.js

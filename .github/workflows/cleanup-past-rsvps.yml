name: Event-Night RSVP Cleanup

# Archives past-event RSVPs to keep the admin view focused on upcoming
# events. Runs the morning AFTER the event so attendees can still be
# checked at the door the day of.
#
# Two crons because GitHub Actions runs in UTC and we want 4 AM
# America/New_York year-round:
#   - 8 AM UTC = 4 AM EDT (Mar-Nov)
#   - 9 AM UTC = 4 AM EST (Nov-Mar)
# Only one is "4 AM local" on any given date; the other firing computes
# today's NY date inside the script, finds nothing whose eventDate is
# strictly before today, and exits silently with no Telegram.

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: cleanup-past-rsvps
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOG_SA_JSON: ${{ secrets.GOOG_SA_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/cleanup-past-rsvps.js

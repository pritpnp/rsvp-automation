name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 13 * * *'  # 9:00 AM EDT / 8:00 AM EST daily
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          [ -z "$SUPABASE_SERVICE_KEY" ] && { echo 'SUPABASE_SERVICE_KEY missing'; exit 1; }
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/vip_passes?select=id&limit=1" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}")
          echo "HTTP status: $status"
          if [ "$status" != "200" ] && [ "$status" != "206" ]; then
            echo "❌ Keep-alive ping failed"
            exit 1
          fi
          echo "✅ Supabase pinged successfully"

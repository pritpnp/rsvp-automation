name: RSVP Sync Check

# Verifies the Google Sheet and Supabase rsvps table stay in agreement.
# Silent when in sync; posts to Telegram only when drift is detected.
#
# 10 minutes is a balance between catching drift quickly and not hammering
# the Sheets API. GitHub Actions cron is also best-effort — tighter intervals
# tend to drift or skip firings, so this is the realistic floor.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Run sync check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOG_SA_JSON: ${{ secrets.GOOG_SA_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node scripts/sync-check.js

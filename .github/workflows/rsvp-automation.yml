name: RSVP Automation

on:
  schedule:
    - cron: "0 8 * * *"  # Daily at 8am UTC
  push:
    branches:
      - main
    paths-ignore:
      - 'dist/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force OCR on all zones (ignore cache)'
        required: false
        default: 'false'
      zone_override:
        description: 'Force OCR on a single zone (e.g. scranton)'
        required: false
        default: ''

# Serialize runs so multiple rapid pushes (e.g. flyer-builder remove + upload + og)
# don't race each other to push deadlines.json / dist/. cancel-in-progress: false
# means new runs queue behind the in-flight one instead of cancelling it.
concurrency:
  group: rsvp-automation-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          # fetch enough history that we can diff back to the last
          # "deploy: update dist" commit (see the FLYERS step below).
          # 50 covers many days of activity without a full clone.
          fetch-depth: 50

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Process all new flyers
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd scripts
          # Diff against the last successful "deploy: update dist" commit
          # rather than HEAD~1. Concurrency in this workflow can cancel
          # intermediate pushes (e.g. a rapid remove-flyer / upload-flyer /
          # upload-og sequence collapses to one surviving run), and
          # HEAD~1...HEAD for that survivor would miss the flyer.jpg change.
          # The last-deploy commit is a stable marker of "everything before
          # this has already been OCR'd"; anything since then needs OCR.
          LAST_DEPLOY=$(git log --pretty=%H --grep='^deploy: update dist' -1 || echo "")
          if [ -n "$LAST_DEPLOY" ] && [ "$LAST_DEPLOY" != "$(git rev-parse HEAD)" ]; then
            DIFF_BASE="$LAST_DEPLOY"
          else
            DIFF_BASE="HEAD~1"
          fi
          echo "📐 Diffing flyer changes since: $DIFF_BASE"
          FLYERS=$(git diff --name-only "$DIFF_BASE" HEAD | grep -E 'flyers/.*\.(jpg|jpeg|png)$' | tr '\n' ',')
          echo "🎯 Flyers to process: $FLYERS"
          FLYER_PATHS="$FLYERS" FORCE_ALL="${{ github.event.inputs.force_all || 'false' }}" ZONE_OVERRIDE="${{ github.event.inputs.zone_override || '' }}" node automate.js

      - name: Commit deadlines.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add deadlines.json || true
          if git diff --staged --quiet; then
            echo "ℹ️  No deadlines.json changes to commit."
            exit 0
          fi
          git commit -m "Auto-update deadlines.json [skip ci]"
          # Retry the push with rebase if the remote moved while we were running.
          # With workflow-level concurrency this should be rare, but the daily
          # cron + a manual push could still overlap by a few seconds.
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "✅ deadlines.json pushed (attempt $attempt)"
              exit 0
            fi
            echo "⚠️  push attempt $attempt rejected — rebasing on origin/main and retrying"
            git pull --rebase origin main
          done
          echo "❌ deadlines.json push failed after 3 attempts"
          exit 1

name: RSVP Automation

on:
  push:
    paths:
      - 'flyers/**/*.jpg'
      - 'flyers/**/*.jpeg'
      - 'flyers/**/*.png'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Get changed flyer files
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E 'flyers/.*\.(jpg|jpeg|png)$' | head -1)
          echo "flyer=$CHANGED" >> $GITHUB_OUTPUT
          echo "Found flyer: $CHANGED"

      - name: Run RSVP automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TALLY_API_KEY: ${{ secrets.TALLY_API_KEY }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          FLYER_PATH: ${{ steps.changed.outputs.flyer }}
        run: |
          cd scripts
          node automate.js

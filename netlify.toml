[build]
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/vip/*"
  to = "/vip/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login/index.html"
  status = 200

[[redirects]]
  from = "/superadmin"
  to = "/admin/index.html"
  status = 302
